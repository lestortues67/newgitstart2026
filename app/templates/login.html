{% extends "MyBase.html" %}
{% block title %}Login FORM{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">Login</h3>
                    
                    <form method="POST" action="/login">
                        <!-- Email Input -->
                        <div class="mb-3">
                            <label for="email" class="form-label d-none">Email Address</label>
                            <input type="email" 
                                   id="email"
                                   class="form-control form-control-lg" 
                                   name="email" 
                                   placeholder="Your Email" 
                                   autofocus 
                                   required>
                        </div>

                        <!-- Password Input -->
                        <div class="mb-3">
                            <label for="password" class="form-label d-none">Password</label>
                            <input type="password" 
                                   id="password"
                                   class="form-control form-control-lg" 
                                   name="password" 
                                   placeholder="Your Password" 
                                   required>
                        </div>

                        <!-- Remember Me -->
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block scripts %}
{{ super() }}
<script type="text/javascript" src="static/js/codebase2026.js"></script>
{% endblock scripts %}
